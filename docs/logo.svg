<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="wabox">
  <!-- the box / tray -->
  <path d="M7 27.5 12 13a3 3 0 0 1 2.83-2h18.34A3 3 0 0 1 36 13l5 14.5"
        stroke="#1f8a59" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
